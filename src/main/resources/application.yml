server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: starrocks-admin

  # SQLite (local metadata database)
  datasource:
    url: jdbc:sqlite:${user.dir}/data/starrocks_admin.db
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1

  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

# Custom application config
app:
  auth:
    jwt-secret: ${JWT_SECRET:change-me-in-production-please-use-a-longer-secret-key-here}
    jwt-expires-in: 24h
  database:
    path: ${user.dir}/data/starrocks_admin.db
  logging:
    level: INFO
    file: ${user.dir}/logs/starrocks-admin.log
  static:
    enabled: true
  metrics:
    enabled: true
    interval-secs: 30
    retention-days: 7
  audit:
    database: starrocks_audit_db__
    table: starrocks_audit_tbl__

spring:
  autoconfigure:
    exclude:
      - org.casbin.spring.boot.autoconfigure.CasbinAutoConfiguration

# SpringDoc / Swagger
springdoc:
  api-docs:
    path: /api-docs/openapi.json
  swagger-ui:
    path: /api-docs
    operations-sorter: method
    tags-sorter: alpha

# Logging
logging:
  level:
    root: INFO
    com.starrocks.admin: DEBUG
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
